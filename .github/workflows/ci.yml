name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Test, Typecheck, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # pnpm must be on PATH before setup-node so its built-in pnpm cache works.
      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache-dependency-path: apps/voice-edge/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Install Playwright Chromium
        run: pnpm --filter @assaddar/widget exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm test:coverage

      - name: Test voice edge
        working-directory: apps/voice-edge
        run: go test ./...

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Quality budgets
        run: pnpm quality:budgets

  smoke:
    name: API smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: assaddar
          POSTGRES_PASSWORD: assaddar
          POSTGRES_DB: assaddar_ai_communication
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U assaddar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://assaddar:assaddar@localhost:5432/assaddar_ai_communication
      ADMIN_API_TOKEN: change-me-dev-admin-token

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # pnpm must be on PATH before setup-node so its built-in pnpm cache works.
      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate

      - name: Seed demo data
        run: pnpm db:seed

      - name: Smoke test API
        run: pnpm smoke:api
