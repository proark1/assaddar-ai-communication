name: Publish Images

# Builds the single shared service image (one image, five services selected at
# runtime via SERVICE / scripts/start-service.mjs) and pushes it to GHCR so a
# release manifest can pin it by digest. Railway keeps building from the repo
# Dockerfile independently; this workflow does not affect Railway deploys.
#
# Publishing is CI-gated: there is no `push` trigger here. ci.yml calls this
# workflow (workflow_call) from its `publish-images` job only after every CI
# job passes on a push to main, so a red commit never publishes an image or
# moves `latest`. workflow_dispatch remains as a manual escape hatch.
#
# Digest retrieval contract: authoritative digests are resolved from the
# immutable tag via
#   docker buildx imagetools inspect ghcr.io/proark1/communication:sha-<full-git-sha>
# The workflow_call outputs below are only available to the caller within the
# SAME workflow run; no API exposes job outputs after a run completes.

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      communication-image:
        description: "Image ref of the pushed communication image"
        value: ${{ jobs.communication.outputs.image }}
      communication-digest:
        description: "Content digest of the pushed communication image"
        value: ${{ jobs.communication.outputs.digest }}

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  communication:
    name: Build and push communication image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      # Consumed by a later release pipeline to digest-pin the image.
      image: ghcr.io/proark1/communication
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/proark1/communication
          # sha-<full git sha> (immutable, every push) + latest (main only).
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish digest to step summary
        run: |
          {
            echo "## Image published"
            echo ""
            echo "| Image | Digest |"
            echo "| --- | --- |"
            echo "| \`ghcr.io/proark1/communication\` | \`${{ steps.push.outputs.digest }}\` |"
            echo ""
            echo "Tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
