version: 2
updates:
  # npm dependencies for the pnpm workspace (manifests are discovered from the
  # root; "/" covers the root package.json and workspace packages).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows under .github/workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
