<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assaddar Widget Example</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #172033;
        background: #f6f7f9;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      section {
        background: #fff;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        color: #637083;
        line-height: 1.6;
      }
      code {
        background: #111827;
        color: #d1fae5;
        border-radius: 6px;
        padding: 2px 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Widget Example Page</h1>
        <p>
          Start the API, seed a tenant, then replace
          <code>PUBLIC_ID_FROM_SEED</code> in this file.
        </p>
      </section>
    </main>
    <script
      src="/src/widget.ts"
      data-assistant-id="PUBLIC_ID_FROM_SEED"
      data-api-url="http://localhost:4000"
      async
    ></script>
  </body>
</html>
