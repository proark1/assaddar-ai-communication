services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: assaddar
      POSTGRES_PASSWORD: assaddar
      POSTGRES_DB: assaddar_ai_communication
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assaddar -d assaddar_ai_communication"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
